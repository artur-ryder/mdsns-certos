<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produzindo Os Melhores Curtos</title>

    <link rel="icon" type="image/png" href="assets/midiaSonsLogo.png">

    <link rel="stylesheet" href="style.css">

    <style>*{
    font-family: 'Poppins';
}
a{
    text-decoration: none;
    color: white
}
html{
    height: 100%;
}
body{
    margin: 0;
    border: 0;
    padding: 0 2rem;

    height: 100%;

    color: white;
    background: linear-gradient(to top, #003070 0%, #000a18 100%);

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
#content{
    display: flex;
    flex-direction: column;
    align-items: center;

    gap: 1rem;
}
#big-logo{
    width: 20rem;
    height: auto;
}
#socials{
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1.5rem;
}

.social{
    cursor: pointer;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: .5rem;

    background-color: rgba(10, 10, 10, 40%);
    backdrop-filter: blur(10px);

    border: solid 1px white;
    border-radius: 1rem;
    padding: 1rem;

    max-width: 25rem;

    aspect-ratio: 1 / 1;

    font-size: large;

    transition: all .3s;
}

.social-wide{
    grid-column: span 2;
    aspect-ratio: auto;

    display: flex;
    flex-direction: row;
}
.social-wide .little-text{
    font-size: medium;
    color: rgb(211, 211, 211);
}
.social:hover{
    transform: scale(110%);
}

.social img{
    width: 5rem;

    filter: invert() brightness(1000);
}

.social-wide img{
    filter: none;
    border-radius: .5rem;
}

/* container central mais controlado */
#content{
    width: 100%;
    max-width: 600px;
}

/* ================== TABLET ================== */

@media (max-width: 768px){

    #big-logo{
        width: 16rem;
    }

    #socials{
        gap: 1rem;
    }

    .social{
        padding: .8rem;
        font-size: medium;
    }

    .social img{
        width: 4rem;
    }

}

/* ================== CELULAR ================== */

@media (max-width: 480px){

    body{
        padding: 0 1rem;
    }

    #big-logo{
        width: 13rem;
    }

    #socials{
        gap: .8rem;
    }

    .social{
        font-size: 0.9rem;
        padding: .7rem;
    }

    .social img{
        width: 3rem;
    }

    .social:hover{
        transform: none;
    }

}</style>
</head>
<body>
    <div id="content">
        <img src="assets/big-logo.png" alt="big-logo midiasons" id="big-logo">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <h1 style="font-weight: 400; font-size: 18pt; margin: 0;">Me Siga nas Outras Redes Socias</h1>
        </div>
        <div id="socials">
            <a href="https://youtube.com/@midiasons" target="_blank">
                <div class="social">
                    <span style="display: block; margin: 0; color: rgb(196, 196, 196); font-size: 10pt;">@midiasons</span>
                    <img src="assets/youtube.svg" alt="youtube logo svg">
                    <span>YouTube</span>
                </div>
            </a>

            <a href="https://tiktok.com/@midiasons" target="_blank">
                <div class="social">
                    <span style="display: block; margin: 0; color: rgb(196, 196, 196); font-size: 10pt;">@midiasons</span>
                    <img src="assets/tiktok.svg" alt="tiktok logo svg">
                    <span>TikTok</span>
                </div>
            </a>

            <a href="https://instagram.com/midiasons" target="_blank">
                <div class="social">
                    <span style="display: block; margin: 0; color: rgb(196, 196, 196); font-size: 10pt;">@midiasons</span>
                    <img src="assets/instagram.svg" alt="instagram logo svg">
                    <span>Instagram</span>
                </div>
            </a>

            <a href="mailto:contato@midiasons.com" target="_blank">
                <div class="social">
                     <span style="display: block; margin: 0; color: rgb(196, 196, 196); font-size: 10pt;">contato@midiasons.com</span>
                    <img src="assets/email.svg" alt="email logo svg">
                    <span>Contato</span>
                </div>
            </a>

            <a href="/melhores-curtos.html" class="social social-wide">

                <img src="assets/icon.png" alt="icon">
                <div style="display: flex; flex-direction: column;">
                    <span>Produza os MELHORES Conteúdos</span>
                    <span style="display: block; margin: 0; color: rgb(196, 196, 196); font-size: 10pt;">Para mais informações, toque aqui.</span>
                    <span class="little-text">R$ 37,90</span>
                </div>
                
            </a>
        </div>
    </div>
    <div style='width: 100vw; height: 100vh; background-image: url("https://midiasons.com/assets/midiaSonsLogo.png"); position: absolute; background-size: cover;background-position: center; z-index: -100; filter: brightness(.1);'></div>
</body>

</html>
